<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse News | Demo Walkthrough</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Demo caption overlay */
        #demo-caption {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 18px 40px;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 400;
            z-index: 99999;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center;
            max-width: 85%;
            backdrop-filter: blur(16px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 0;
            letter-spacing: 0.3px;
            line-height: 1.5;
        }
        #demo-caption.visible {
            opacity: 1;
        }
        #demo-caption .caption-icon {
            margin-right: 10px;
            font-size: 24px;
        }
        /* Highlight pulse for sections */
        .demo-highlight {
            animation: demoHighlight 1.5s ease-in-out;
        }
        @keyframes demoHighlight {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 30px 10px rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow finance-glow"></div>
        <div class="glow sports-glow"></div>
        <div class="glow war-glow"></div>
        <div class="glow ai-glow"></div>
        <div class="glow crypto-glow"></div>
    </div>
    
    <header class="app-header">
        <div class="logo-container">
            <h1>PULSE<span class="dot">.</span></h1>
            <p>Live Hourly Top 10 Updates</p>
        </div>
        <div class="time-container">
            <div id="clock" class="clock">--:--:--</div>
            <div class="date" id="date">Loading date...</div>
        </div>
    </header>

    <main class="dashboard">
        <section class="topic-section" id="section-finance">
            <div class="section-header">
                <h2>Finance</h2>
                <div class="live-indicator"></div>
            </div>
            <div class="news-list" id="list-finance"></div>
        </section>

        <section class="topic-section" id="section-sports">
            <div class="section-header">
                <h2>Sports</h2>
                <div class="live-indicator"></div>
            </div>
            <div class="news-list" id="list-sports"></div>
        </section>

        <section class="topic-section" id="section-war">
            <div class="section-header">
                <h2>Global Conflict</h2>
                <div class="live-indicator"></div>
            </div>
            <div class="news-list" id="list-war"></div>
        </section>

        <section class="topic-section" id="section-ai">
            <div class="section-header">
                <h2>Artificial Intelligence</h2>
                <div class="live-indicator"></div>
            </div>
            <div class="news-list" id="list-ai"></div>
        </section>

        <section class="topic-section" id="section-crypto">
            <div class="section-header">
                <h2>Stocks & Crypto</h2>
                <div class="live-indicator"></div>
            </div>
            <div class="news-list" id="list-crypto"></div>
        </section>
    </main>

    <!-- Caption overlay element -->
    <div id="demo-caption"></div>

    <script src="app.js"></script>
    <script>
        // Demo caption system
        const captionEl = document.getElementById('demo-caption');
        
        function showCaption(text, icon) {
            captionEl.classList.remove('visible');
            setTimeout(() => {
                captionEl.innerHTML = (icon ? '<span class="caption-icon">' + icon + '</span>' : '') + text;
                captionEl.classList.add('visible');
            }, 500);
        }

        function hideCaption() {
            captionEl.classList.remove('visible');
        }

        function highlightSection(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('demo-highlight');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => el.classList.remove('demo-highlight'), 2000);
            }
        }

        // Scripted demo timeline
        const demoSteps = [
            { time: 3000,  action: () => showCaption('Welcome to PULSE — Your Real-Time News Dashboard', '🚀') },
            { time: 8000,  action: () => showCaption('A premium, dark-themed interface built with Vanilla HTML, CSS & JavaScript', '🎨') },
            { time: 13000, action: () => { showCaption('The header features a live clock updating every second', '🕐'); window.scrollTo({ top: 0, behavior: 'smooth' }); }},
            { time: 18000, action: () => showCaption('5 live news categories, each color-coded with unique accent colors', '📰') },
            { time: 23000, action: () => { showCaption('Finance — Live business news from Yahoo Finance', '💰'); highlightSection('section-finance'); }},
            { time: 28000, action: () => { showCaption('Sports — Latest updates powered by ESPN RSS feed', '🏆'); highlightSection('section-sports'); }},
            { time: 33000, action: () => { showCaption('Global Conflict — World news from BBC, highlighted in red-pink', '🌍'); highlightSection('section-war'); }},
            { time: 38000, action: () => { showCaption('Artificial Intelligence — Tech news from TechCrunch in cyan blue', '🤖'); highlightSection('section-ai'); }},
            { time: 43000, action: () => { showCaption('Stocks & Crypto — Market insights from CoinTelegraph in purple', '📈'); highlightSection('section-crypto'); }},
            { time: 48000, action: () => { showCaption('Each card features smooth hover animations with a colored accent bar', '✨'); window.scrollTo({ top: 0, behavior: 'smooth' }); }},
            { time: 53000, action: () => showCaption('Pulsing live indicators show real-time data feed status', '🔴') },
            { time: 58000, action: () => showCaption('Node.js proxy backend fetches RSS feeds to bypass CORS restrictions', '🔧') },
            { time: 63000, action: () => showCaption('Glassmorphism UI with animated glowing background effects', '💎') },
            { time: 68000, action: () => showCaption('Responsive grid layout adapts to all screen sizes', '📱') },
            { time: 73000, action: () => showCaption('News auto-refreshes every hour to keep you updated', '🔄') },
            { time: 78000, action: () => showCaption('PULSE News Dashboard — Stay informed, stay ahead.', '⚡') },
            { time: 84000, action: () => hideCaption() },
        ];

        // Start the demo timeline after page loads
        setTimeout(() => {
            demoSteps.forEach(step => {
                setTimeout(step.action, step.time);
            });
        }, 1000);
    </script>
</body>
</html>
